services:
  - type: web
    name: klyramachine-server
    runtime: python
    buildCommand: cd server && pip install -r requirements.txt
    startCommand: cd server && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
